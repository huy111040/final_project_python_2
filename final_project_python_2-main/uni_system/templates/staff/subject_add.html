{% extends 'base.html' %}

{% block title %}Thêm Môn Học Mới{% endblock %}

{% block content %}
<div class="container mb-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="text-info fw-bold mb-0"><i class="bi bi-book-half me-2"></i>Thêm Môn Học Mới</h3>
                <a href="{{ url('staff_dashboard') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3 shadow-sm"><i class="bi bi-arrow-left"></i> Quay lại</a>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <input type="hidden" name="csrfmiddlewaretoken" value="{{ get_csrf_token(request) }}">

                        {% for field in form %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-info text-white fw-bold w-100 mt-2 py-3 rounded-pill shadow-sm">
                            <i class="bi bi-check-circle me-1"></i> Lưu Môn Học
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
